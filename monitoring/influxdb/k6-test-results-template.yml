# InfluxDB stack template — apply with:
#   influx apply -f monitoring/influxdb/k6-test-results-template.yml \
#     --host https://YOUR-CLUSTER.cloud2.influxdata.com \
#     --org YOUR_ORG_ID \
#     --token YOUR_TOKEN \
#     --force yes
#
# Requires bucket "k6" (create in InfluxDB Cloud if missing).
# Does NOT create the bucket — only dashboard + testid variable.

apiVersion: influxdata.com/v2alpha1
kind: Label
metadata:
  name: testflow-k6-label
spec:
  color: '#7a65f2'
  description: testflow-k6 performance tests
  name: k6
---
apiVersion: influxdata.com/v2alpha1
kind: Variable
metadata:
  name: testflow-k6-testid-var
spec:
  associations:
    - kind: Label
      name: testflow-k6-label
  language: flux
  name: testid
  query: |-
    import "influxdata/influxdb/schema"

    schema.tagValues(bucket: "k6", tag: "testid")
  type: query
---
apiVersion: influxdata.com/v2alpha1
kind: Dashboard
metadata:
  name: testflow-k6-results
spec:
  associations:
    - kind: Label
      name: testflow-k6-label
  name: K6 Test Results
  charts:
    - colors:
        - hex: '#00C9FF'
          id: base
          name: laser
          type: text
      decimalPlaces: 2
      height: 3
      kind: Single_Stat
      name: Requests Made
      queries:
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "http_reqs")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r["_field"] == "value")
              |> group(columns: ["_measurement"])
              |> sum()
              |> last()
      width: 2
    - colors:
        - hex: '#00C9FF'
          id: base
          name: laser
          type: text
      decimalPlaces: 0
      height: 3
      kind: Single_Stat
      name: HTTP Failures
      queries:
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "http_req_failed")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r["_field"] == "value")
              |> group(columns: ["_measurement"])
              |> sum()
              |> last()
      width: 2
      xPos: 2
    - colors:
        - hex: '#00C9FF'
          id: base
          name: laser
          type: text
      decimalPlaces: 2
      height: 3
      kind: Single_Stat
      name: Peak RPS
      queries:
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "http_reqs")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r["_field"] == "value")
              |> group()
              |> aggregateWindow(every: v.windowPeriod, fn: sum, createEmpty: false)
              |> max()
              |> last()
      suffix: ' req/s'
      width: 2
      xPos: 4
    - colors:
        - hex: '#00C9FF'
          id: base
          name: laser
          type: text
      decimalPlaces: 2
      height: 3
      kind: Single_Stat
      name: P95 Response Time
      queries:
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r._measurement == "http_req_duration")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r._field == "value")
              |> group()
              |> quantile(q: 0.95, method: "exact_mean")
              |> last()
      suffix: ' ms'
      width: 2
      xPos: 6
    - colors:
        - hex: '#00C9FF'
          id: base
          name: laser
          type: text
      decimalPlaces: 2
      height: 3
      kind: Single_Stat
      name: Data Received
      queries:
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r._measurement == "data_received")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r._field == "value")
              |> group()
              |> sum()
              |> last()
      suffix: ' B'
      width: 2
      xPos: 8
    - colors:
        - hex: '#00C9FF'
          id: base
          name: laser
          type: text
      decimalPlaces: 2
      height: 3
      kind: Single_Stat
      name: Data Sent
      queries:
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r._measurement == "data_sent")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r._field == "value")
              |> group()
              |> sum()
              |> last()
      suffix: ' B'
      width: 2
      xPos: 10
    - axes:
        - base: '10'
          name: x
          scale: linear
        - base: '10'
          name: y
          scale: linear
      colors:
        - hex: '#31C0F6'
          id: 4b85c645-37e8-484c-b8c1-b9c24ade5298
          name: Nineteen Eighty Four
          type: scale
        - hex: '#A500A5'
          id: d9cfed2d-ade2-4e11-828c-25e71804dec3
          name: Nineteen Eighty Four
          type: scale
        - hex: '#FF7E27'
          id: b966ce10-9565-4f39-8862-d6c1019e4bc9
          name: Nineteen Eighty Four
          type: scale
      geom: line
      height: 5
      kind: Xy
      name: VUs, Response Time & RPS
      position: overlaid
      queries:
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r._measurement == "http_req_duration")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r._field == "value")
              |> filter(fn: (r) => r.status == "200")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
              |> yield(name: "avg_response_ms")
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "vus")
              |> yield(name: "active_vus")
        - query: |-
            from(bucket: "k6")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "http_reqs")
              |> filter(fn: (r) => r["testid"] == v.testid)
              |> filter(fn: (r) => r["_field"] == "value")
              |> group(columns: ["_measurement"])
              |> aggregateWindow(every: 1s, fn: sum, createEmpty: false)
              |> yield(name: "rps")
      width: 12
      xCol: _time
      yCol: _value
      yPos: 3
